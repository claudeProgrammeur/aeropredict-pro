<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPredict Pro | Inscription</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #6c8eff;
            --gradient: linear-gradient(135deg, #4361ee 0%, #7209b7 100%);
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffb703;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }
        
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
            border: 1px solid var(--gray-200);
            max-width: 500px;
            margin: 0 auto;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h2 {
            font-weight: 700;
            color: var(--gray-800);
        }
        
        .form-control {
            background: var(--gray-50);
            border: 1.5px solid var(--gray-200);
            border-radius: 14px;
            padding: 0.8rem 1rem;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
        }
        
        .btn-primary-custom {
            background: var(--gradient);
            border: none;
            color: white;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 50px;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67,97,238,0.3);
        }
        
        .btn-outline-secondary {
            border: 1.5px solid var(--gray-200);
            background: transparent;
            color: var(--gray-600);
            padding: 0.8rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-outline-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(67,97,238,0.05);
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--gray-200);
        }
        
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        .divider span {
            background: white;
            padding: 0 1rem;
            color: var(--gray-600);
            font-size: 0.85rem;
        }
        
        .alert-custom {
            border-radius: 16px;
            border-left: 4px solid var(--primary);
            animation: fadeInDown 0.4s ease;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .password-strength {
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
        
        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--gray-700);
            margin-bottom: 0.4rem;
        }
        
        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 col-lg-6 mx-auto">
                <div class="auth-card animate__animated animate__fadeInUp">
                    <div class="auth-header">
                        <div class="animate__animated animate__pulse animate__infinite" style="display: inline-block;">
                            <i class="fas fa-fighter-jet fa-3x mb-3" style="color: var(--primary);"></i>
                        </div>
                        <h2>Créer un compte</h2>
                        <p class="text-muted">Rejoignez AeroPredict Pro</p>
                    </div>
                    
                    <!-- Affichage des messages Django -->
                    {% if messages %}
                        <div id="django-messages">
                            {% for message in messages %}
                                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-custom animate__animated animate__fadeInDown" role="alert">
                                    <i class="fas fa-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}exclamation-circle{% else %}info-circle{% endif %} me-2"></i>
                                    {{ message }}
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                    
                    <div id="alert-container"></div>
                    
                    <form method="POST" action="{% url 'inscription' %}" id="signup-form">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Nom d'utilisateur</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Adresse email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <div class="password-strength">
                                    <div class="password-strength-bar" id="strength-bar"></div>
                                </div>
                                <small class="text-muted" id="strength-text"></small>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Confirmer le mot de passe</label>
                                <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                                    <label class="form-check-label small text-muted">
                                        J'accepte les <a href="#" class="text-primary">conditions d'utilisation</a>
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-custom mt-4">
                              <i class="fas fa-user-plus me-2"></i>S'inscrire
                            </a>
                        </button>
                    </form>
                    
                    <!-- 🔥 LIEN VERS LA PAGE DE CONNEXION AJOUTÉ ICI -->
                    <div class="divider"><span>ou</span></div>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'connexion' %}" class="btn-outline-secondary">
                            <i class="fas fa-sign-in-alt me-2"></i>Déjà un compte ? Se connecter
                        </a>
                    </div>
                    
                    <p class="text-center text-muted small mt-4">
                        En créant un compte, vous acceptez nos conditions générales.
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Force du mot de passe
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            const percentage = (strength / 5) * 100;
            strengthBar.style.width = percentage + '%';
            
            if (percentage < 20) {
                strengthBar.style.background = '#ef476f';
                strengthText.textContent = 'Très faible';
                strengthText.style.color = '#ef476f';
            } else if (percentage < 40) {
                strengthBar.style.background = '#ffb703';
                strengthText.textContent = 'Faible';
                strengthText.style.color = '#ffb703';
            } else if (percentage < 60) {
                strengthBar.style.background = '#ffb703';
                strengthText.textContent = 'Moyen';
                strengthText.style.color = '#ffb703';
            } else if (percentage < 80) {
                strengthBar.style.background = '#06d6a0';
                strengthText.textContent = 'Fort';
                strengthText.style.color = '#06d6a0';
            } else {
                strengthBar.style.background = '#059669';
                strengthText.textContent = 'Très fort';
                strengthText.style.color = '#059669';
            }
        });
        
        // Validation avant soumission
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password_confirm').value;
            
            if (password !== confirm) {
                e.preventDefault();
                showAlert('Les mots de passe ne correspondent pas', 'danger');
                return false;
            }
            
            if (password.length < 8) {
                e.preventDefault();
                showAlert('Le mot de passe doit contenir au moins 8 caractères', 'danger');
                return false;
            }
            
            if (password.isdigit()) {
                e.preventDefault();
                showAlert('Le mot de passe ne peut pas contenir uniquement des chiffres', 'danger');
                return false;
            }
            
            const terms = document.getElementById('terms');
            if (!terms.checked) {
                e.preventDefault();
                showAlert('Vous devez accepter les conditions d\'utilisation', 'warning');
                return false;
            }
            
            return true;
        });
        
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            const alertClass = type === 'success' ? 'alert-success' : (type === 'warning' ? 'alert-warning' : 'alert-danger');
            const icon = type === 'success' ? 'check-circle' : (type === 'warning' ? 'exclamation-triangle' : 'exclamation-circle');
            
            container.innerHTML = `
                <div class="alert ${alertClass} alert-custom animate__animated animate__fadeInDown" role="alert">
                    <i class="fas fa-${icon} me-2"></i>
                    ${message}
                </div>
            `;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        // Faire disparaître les messages Django après 5 secondes
        setTimeout(() => {
            const djangoMessages = document.getElementById('django-messages');
            if (djangoMessages) {
                djangoMessages.style.transition = 'opacity 0.5s';
                djangoMessages.style.opacity = '0';
                setTimeout(() => {
                    djangoMessages.remove();
                }, 500);
            }
        }, 5000);
    </script>
</body>
</html>
