<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPredict Pro | Connexion</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #4361ee;
            --gradient: linear-gradient(135deg, #4361ee 0%, #7209b7 100%);
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }
        
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
            border: 1px solid var(--gray-200);
            max-width: 450px;
            margin: 0 auto;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h2 {
            font-weight: 700;
            color: var(--gray-800);
        }
        
        .form-control {
            background: var(--gray-50);
            border: 1.5px solid var(--gray-200);
            border-radius: 14px;
            padding: 0.8rem 1rem;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
        }
        
        .btn-primary-custom {
            background: var(--gradient);
            border: none;
            color: white;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 50px;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67,97,238,0.3);
        }
        
        .btn-outline-secondary {
            border: 1.5px solid var(--gray-200);
            background: transparent;
            color: var(--gray-600);
            padding: 0.8rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-outline-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(67,97,238,0.05);
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--gray-200);
        }
        
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        .divider span {
            background: white;
            padding: 0 1rem;
            color: var(--gray-600);
            font-size: 0.85rem;
        }
        
        .alert-custom {
            border-radius: 16px;
            border-left: 4px solid var(--primary);
            animation: fadeInDown 0.4s ease;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--gray-700);
            margin-bottom: 0.4rem;
        }
        
        .forgot-link {
            font-size: 0.8rem;
            color: var(--primary);
            text-decoration: none;
        }
        
        .forgot-link:hover {
            text-decoration: underline;
        }
        
        .social-btn {
            border: 1.5px solid var(--gray-200);
            border-radius: 14px;
            padding: 0.7rem;
            transition: all 0.3s;
            background: var(--gray-50);
        }
        
        .social-btn:hover {
            background: var(--gray-100);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 col-lg-6 mx-auto">
                <div class="auth-card animate__animated animate__fadeInUp">
                    <div class="auth-header">
                        <div class="animate__animated animate__pulse animate__infinite" style="display: inline-block;">
                            <i class="fas fa-fighter-jet fa-3x mb-3" style="color: var(--primary);"></i>
                        </div>
                        <h2>Bienvenue</h2>
                        <p class="text-muted">Connectez-vous à votre espace AeroPredict</p>
                    </div>
                    
                    <!-- Affichage des messages Django -->
                    {% if messages %}
                        <div id="django-messages">
                            {% for message in messages %}
                                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-custom animate__animated animate__fadeInDown" role="alert">
                                    <i class="fas fa-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}exclamation-circle{% else %}info-circle{% endif %} me-2"></i>
                                    {{ message }}
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                    
                    <div id="alert-container"></div>
                    
                    <form method="POST" action="{% url 'connexion' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Nom d'utilisateur</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 14px 0 0 14px;">
                                    <i class="fas fa-user text-muted"></i>
                                </span>
                                <input type="text" class="form-control border-start-0" id="username" name="username" 
                                       style="border-radius: 0 14px 14px 0;" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 14px 0 0 14px;">
                                    <i class="fas fa-lock text-muted"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" id="password" name="password" 
                                       style="border-radius: 0 14px 14px 0;" required>
                                <button type="button" class="btn btn-outline-secondary border-start-0" 
                                        style="border-radius: 0 14px 14px 0;" onclick="togglePassword()">
                                    <i class="fas fa-eye" id="toggle-icon"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small text-muted">
                                    Se souvenir de moi
                                </label>
                            </div>
                            <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-custom">
                            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                        </button>
                    </form>
                    
                    <div class="divider"><span>ou</span></div>
                    
                    <div class="row g-2">
                        <div class="col-6">
                            <button class="social-btn w-100" onclick="socialLogin('google')">
                                <i class="fab fa-google text-danger me-2"></i> Google
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="social-btn w-100" onclick="socialLogin('github')">
                                <i class="fab fa-github me-2"></i> GitHub
                            </button>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted small mb-0">
                            Pas encore de compte ? 
                            <a href="{% url 'inscription' %}" class="text-primary fw-bold text-decoration-none">S'inscrire</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const password = document.getElementById('password');
            const icon = document.getElementById('toggle-icon');
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function socialLogin(provider) {
            showAlert(`Connexion avec ${provider} bientôt disponible`, 'info');
        }
        
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            const alertClass = type === 'success' ? 'alert-success' : (type === 'warning' ? 'alert-warning' : 'alert-info');
            const icon = type === 'success' ? 'check-circle' : (type === 'warning' ? 'exclamation-triangle' : 'info-circle');
            
            container.innerHTML = `
                <div class="alert ${alertClass} alert-custom animate__animated animate__fadeInDown" role="alert">
                    <i class="fas fa-${icon} me-2"></i>
                    ${message}
                </div>
            `;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        // Faire disparaître les messages Django après 5 secondes
        setTimeout(() => {
            const djangoMessages = document.getElementById('django-messages');
            if (djangoMessages) {
                djangoMessages.style.transition = 'opacity 0.5s';
                djangoMessages.style.opacity = '0';
                setTimeout(() => {
                    djangoMessages.remove();
                }, 500);
            }
        }, 5000);
    </script>
</body>
</html>
