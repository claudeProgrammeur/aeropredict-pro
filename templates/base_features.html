<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPredict Pro | {% block title %}Fonctionnalité{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #6c8eff;
            --secondary: #7209b7;
            --gradient: linear-gradient(135deg, #4361ee 0%, #7209b7 100%);
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-800: #1e293b;
            --dark: #0f172a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
        }
        
        .navbar {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 0.8rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .nav-link {
            color: var(--gray-600) !important;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .nav-link:hover {
            color: var(--primary) !important;
        }
        
        .btn-back {
            background: var(--gradient);
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67,97,238,0.3);
            color: white;
        }
        
        .page-header {
            padding: 100px 0 60px;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
        }
        
        .page-title {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .footer {
            background: var(--dark);
            color: var(--gray-400);
            padding: 60px 0 30px;
            margin-top: 60px;
        }
        
        @media (max-width: 768px) {
            .page-title { font-size: 2rem; }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'accueil' %}">
            <i class="fas fa-fighter-jet me-2"></i>AeroPredict Pro
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}">Accueil</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#features">Fonctionnalités</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#about">À propos</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'test_radar' %}">Live Radar</a></li>
            </ul>
            <a href="{% url 'accueil' %}" class="btn-back"><i class="fas fa-arrow-left me-2"></i>Retour à l'accueil</a>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <div class="container text-center">
        <p>&copy; 2026 AeroPredict Pro. Tous droits réservés.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
