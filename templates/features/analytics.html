<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPredict Pro | Analytics</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4361ee;
            --gradient: linear-gradient(135deg, #4361ee 0%, #7209b7 100%);
            --success: #06d6a0;
            --warning: #ffb703;
            --danger: #ef476f;
            --gray-50: #f8fafc;
            --gray-200: #e2e8f0;
            --gray-800: #1e293b;
            --dark: #0f172a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
        }
        
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 0.8rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-link {
            color: var(--gray-600) !important;
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: var(--primary) !important;
        }
        
        .btn-back {
            background: var(--gradient);
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
        }
        
        .page-header {
            padding-top: 100px;
            padding-bottom: 60px;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
        }
        
        .page-title {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid var(--gray-200);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
        }
        
        .chart-container {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--gray-200);
            height: 300px;
        }
        
        .footer {
            background: var(--dark);
            color: var(--gray-400);
            padding: 60px 0 30px;
            margin-top: 60px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'accueil' %}"><i class="fas fa-fighter-jet me-2"></i>AeroPredict Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#home">Accueil</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#features">Fonctionnalités</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#contact">Contact</a></li>
            </ul>
            <a href="{% url 'accueil'%}" class="btn btn-back"><i class="fas fa-arrow-left me-2"></i>Retour</a>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="container text-center">
        <div class="animate__animated animate__fadeInDown">
            <i class="fas fa-chart-pie fa-3x mb-3" style="color: var(--primary);"></i>
            <h1 class="page-title">Analytics Avancés</h1>
            <p class="text-muted fs-5 mt-3">Visualisez et analysez les performances de votre flotte</p>
        </div>
    </div>
</section>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value">-40%</div>
            <div class="text-muted">Temps d'arrêt</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">+25%</div>
            <div class="text-muted">Disponibilité</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">99%</div>
            <div class="text-muted">Précision IA</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">24/7</div>
            <div class="text-muted">Surveillance</div>
        </div>
    </div>
    
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="chart-container">
                <canvas id="rulChart"></canvas>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="row g-4 mt-3">
        <div class="col-lg-12">
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container text-center">
        <p>&copy; 2024 AeroPredict Pro. Tous droits réservés.</p>
    </div>
</footer>

<script>
    new Chart(document.getElementById('rulChart'), {
        type: 'line',
        data: {
            labels: ['Cycle 0', 'Cycle 20', 'Cycle 40', 'Cycle 60', 'Cycle 80', 'Cycle 100'],
            datasets: [{
                label: 'RUL prédit',
                data: [125, 105, 85, 65, 45, 25],
                borderColor: '#4361ee',
                backgroundColor: 'rgba(67,97,238,0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
    
    new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
            labels: ['Sains', 'Attention', 'Critique'],
            datasets: [{
                data: [65, 25, 10],
                backgroundColor: ['#06d6a0', '#ffb703', '#ef476f']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
    
    new Chart(document.getElementById('trendChart'), {
        type: 'bar',
        data: {
            labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun'],
            datasets: [{
                label: 'Anomalies détectées',
                data: [12, 19, 15, 8, 6, 4],
                backgroundColor: '#4361ee'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
</script>
</body>
</html>
