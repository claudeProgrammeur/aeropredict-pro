<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPredict Pro | Import CSV</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4361ee;
            --gradient: linear-gradient(135deg, #4361ee 0%, #7209b7 100%);
            --success: #06d6a0;
            --gray-50: #f8fafc;
            --gray-200: #e2e8f0;
            --gray-800: #1e293b;
            --dark: #0f172a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
        }
        
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 0.8rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-link {
            color: var(--gray-600) !important;
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: var(--primary) !important;
        }
        
        .btn-back {
            background: var(--gradient);
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
        }
        
        .page-header {
            padding-top: 100px;
            padding-bottom: 60px;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
        }
        
        .page-title {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .upload-area {
            border: 2px dashed var(--gray-200);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            background: white;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(67,97,238,0.02);
        }
        
        .template-table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        
        .footer {
            background: var(--dark);
            color: var(--gray-400);
            padding: 60px 0 30px;
            margin-top: 60px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.0/papaparse.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'accueil' %}"><i class="fas fa-fighter-jet me-2"></i>AeroPredict Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#home">Accueil</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#features">Fonctionnalités</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'accueil' %}#contact">Contact</a></li>
            </ul>
            <a href="{% url 'accueil'%}" class="btn btn-back"><i class="fas fa-arrow-left me-2"></i>Retour</a>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="container text-center">
        <div class="animate__animated animate__fadeInDown">
            <i class="fas fa-file-csv fa-3x mb-3" style="color: var(--primary);"></i>
            <h1 class="page-title">Import CSV</h1>
            <p class="text-muted fs-5 mt-3">Analysez vos données historiques en masse</p>
        </div>
    </div>
</section>

<div class="container">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="upload-area" onclick="document.getElementById('csvFile').click()">
                <i class="fas fa-cloud-upload-alt fa-4x mb-3" style="color: var(--primary);"></i>
                <h5>Glissez-déposez votre fichier CSV</h5>
                <p class="text-muted">ou cliquez pour parcourir</p>
                <input type="file" id="csvFile" accept=".csv" style="display:none">
                <button class="btn btn-outline-primary mt-3" onclick="downloadTemplate()">
                    <i class="fas fa-download me-2"></i>Télécharger le template
                </button>
            </div>
        </div>
    </div>
    
    <div id="preview" class="mt-4" style="display:none;">
        <h5>Aperçu des données</h5>
        <div class="template-table">
            <table class="table table-bordered mb-0" id="previewTable">
                <thead class="table-light"><tr><th>...</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="text-center mt-4">
            <button class="btn btn-primary" onclick="analyzeCSV()">Analyser le fichier</button>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container text-center">
        <p>&copy; 2024 AeroPredict Pro. Tous droits réservés.</p>
    </div>
</footer>

<script>
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    displayPreview(results.data);
                }
            });
        }
    });
    
    function displayPreview(data) {
        const preview = document.getElementById('preview');
        const table = document.getElementById('previewTable');
        const headers = Object.keys(data[0]);
        
        let html = '<thead class="table-light"><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
        data.slice(0, 5).forEach(row => {
            html += '<tr>' + headers.map(h => `<td>${row[h] || ''}</td>`).join('') + '</tr>';
        });
        html += '</tbody>';
        table.innerHTML = html;
        preview.style.display = 'block';
    }
    
    function downloadTemplate() {
        const csv = 'engine_id,cycle,altitude,mach,regime,s2,s3,s4,s7,s8,s9,s11,s12,s13,s14,s15,s17,s20,s21\nCFM56_001,1,35000,0.6,100,518.67,1589,1406,554,2388,9064,47,522,2388,8143,8.4,392,39,23';
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'template_aeropredict.csv';
        a.click();
    }
    
    function analyzeCSV() {
        alert('Analyse des données en cours... Redirection vers le diagnostic');
        window.location.href = '/maintenance/input/';
    }
</script>
</body>
</html>
