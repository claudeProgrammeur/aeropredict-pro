# docker-compose.yml
version: '3.8'

networks:
  aeropredict-net:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  media_volume:
  prometheus-data:
  grafana-data:

services:
  # ============================================================
  # PostgreSQL
  # ============================================================
  db:
    image: postgres:16
    container_name: aeropredict_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aeropredict
      POSTGRES_USER: aeropredict
      POSTGRES_PASSWORD: xzkmkclaude
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeropredict"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aeropredict-net

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: aeropredict_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aeropredict-net

  # ============================================================
  # Django + Daphne
  # ============================================================
  web:
    build: .
    container_name: aeropredict_web
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8000 aeronoth.asgi:application
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_NAME=aeropredict
      - DB_USER=aeropredict
      - DB_PASSWORD=xzkmkclaude
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@aeropredict.com
      - DJANGO_SUPERUSER_PASSWORD=admin123
    networks:
      - aeropredict-net

  # ============================================================
  # Celery Worker
  # ============================================================
  celery:
    build: .
    container_name: aeropredict_celery
    restart: unless-stopped
    command: celery -A aeronoth worker -l info --pool=solo
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_NAME=aeropredict
      - DB_USER=aeropredict
      - DB_PASSWORD=aeropredict123
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    networks:
      - aeropredict-net

  # ============================================================
  # Celery Beat (tâches planifiées)
  # ============================================================
  celery-beat:
    build: .
    container_name: aeropredict_celery_beat
    restart: unless-stopped
    command: celery -A aeronoth beat -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - aeropredict-net

  # ============================================================
  # Prometheus (Monitoring)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: aeropredict_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - aeropredict-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================================
  # Grafana (Visualisation)
  # ============================================================
  grafana:
    image: grafana/grafana:10.0.0
    container_name: aeropredict_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aeropredict-net